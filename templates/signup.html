<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - AI 면접관</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060d1f;
      position: relative;
      overflow: hidden;
    }
    .auth-wrapper::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }
    .auth-wrapper::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(124, 58, 237, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-card {
      background: rgba(8, 18, 40, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(0,212,255,0.1);
      position: relative;
      z-index: 1;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.6), transparent);
      border-radius: 100px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-logo .logo-icon { font-size: 2.5rem; }
    .auth-logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e8f4fd, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 10px 0 6px;
    }
    .auth-logo p { color: rgba(123, 167, 194, 0.8); font-size: 0.875rem; }
    .auth-form .form-group { margin-bottom: 20px; }
    .auth-form label {
      display: block;
      color: rgba(0, 212, 255, 0.75);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .auth-form input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 10px;
      color: #e8f4fd;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: all 0.25s;
      outline: none;
    }
    .auth-form input:focus {
      border-color: #00d4ff;
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.12), 0 0 20px rgba(0, 212, 255, 0.08);
    }
    .auth-form input::placeholder { color: rgba(123, 167, 194, 0.4); }
    .btn-auth {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0099cc, #00d4ff);
      border: none;
      border-radius: 10px;
      color: #000d1a;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.25s;
      letter-spacing: 0.3px;
    }
    .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5); }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(123, 167, 194, 0.7);
      font-size: 0.875rem;
    }
    .auth-footer a { color: #00d4ff; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.875rem;
    }
    .alert-error { background: rgba(255, 68, 102, 0.12); border: 1px solid rgba(255, 68, 102, 0.35); color: #ff8fa3; }
    .alert-success { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); color: #00ff88; }
    .password-hint {
      font-size: 0.78rem;
      color: rgba(123, 167, 194, 0.5);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🤖</div>
        <h1>회원가입</h1>
        <p>AI 면접관 서비스에 오신 것을 환영합니다</p>
      </div>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      {% if message %}
      <div class="alert alert-success">{{ message }}</div>
      {% endif %}

      <form class="auth-form" method="POST" action="/signup">
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" placeholder="비밀번호 입력" required minlength="6" />
          <p class="password-hint">6자 이상 입력해주세요</p>
        </div>
        <div class="form-group">
          <label for="password_confirm">비밀번호 확인</label>
          <input type="password" id="password_confirm" name="password_confirm" placeholder="비밀번호 재입력" required />
        </div>
        <button type="submit" class="btn-auth">회원가입</button>
      </form>

      <div class="auth-footer">
        이미 계정이 있으신가요? <a href="/login">로그인</a>
      </div>
    </div>
  </div>
</body>
</html>
